on:
  pull_request:
    paths: &paths
      - 'config/**'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/mutation.yml'
      - 'composer.json'
      - 'infection.json.dist'

  push:
    branches: ['master']
    paths: *paths

name: mutation test

permissions:
  contents: read

jobs:
  mutation:
    uses: yiisoft/actions/.github/workflows/roave-infection.yml@master
    with:
      php: >-
        ['8.4']
    secrets:
      STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
